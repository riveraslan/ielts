<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Vocabulary - 雅思单词学习</title>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.app { width: 100%; max-width: 920px; padding: 20px 16px 40px; display: flex; gap: 24px; align-items: flex-start; }
.main-col { flex: 1; min-width: 0; }
.side-col { width: 140px; flex-shrink: 0; position: sticky; top: 20px; }
.header { text-align: center; padding: 24px 0 8px; }
.header h1 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { color: var(--text2); font-size: 14px; margin-top: 4px; }
.tabs { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; margin: 16px 0; }
.tab {
  flex: 1; padding: 10px 8px; text-align: center; border: none; background: transparent;
  color: var(--text2); border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 500; transition: all .2s;
}
.tab.active { background: var(--surface2); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }
.card-container { perspective: 1000px; margin: 20px 0; }
.card-word { font-size: 36px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
.card-phonetic { font-size: 16px; color: var(--accent); margin-bottom: 16px; text-align: center; }
.card-tag { font-size: 12px; color: var(--text2); background: rgba(255,255,255,.08); padding: 4px 12px; border-radius: 20px; display: inline-block; }
.fc-card {
  background: linear-gradient(145deg, #1e3a5f, #1a2744);
  border: 1px solid rgba(56,189,248,.2);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
  text-align: center;
}
.fc-input {
  width: 100%; padding: 14px 18px; font-size: 18px; background: var(--surface);
  border: 2px solid var(--surface2); border-radius: var(--radius-sm); color: var(--text);
  text-align: center; outline: none; transition: border-color .2s; margin: 16px 0;
}
.fc-input:focus { border-color: var(--accent); }
.fc-input.correct { border-color: var(--green); background: rgba(52,211,153,.1); }
.fc-input.wrong { border-color: var(--red); background: rgba(248,113,113,.1); }
.fc-answer {
  margin-top: 12px; padding: 14px; background: rgba(129,140,248,.1);
  border-radius: var(--radius-sm); display: none;
}
.fc-answer.show { display: block; }
.fc-answer .meaning { font-size: 22px; font-weight: 600; color: #c4b5fd; }
.fc-answer .example { font-size: 14px; color: var(--text2); font-style: italic; margin-top: 6px; }
.fc-feedback { text-align: center; margin-top: 8px; font-size: 15px; min-height: 22px; }
.fc-feedback.ok { color: var(--green); }
.fc-feedback.no { color: var(--red); }
.actions { display: flex; gap: 10px; margin: 16px 0; justify-content: center; }
.btn {
  padding: 12px 24px; border: none; border-radius: var(--radius-sm); font-size: 15px;
  font-weight: 600; cursor: pointer; transition: all .2s;
}
.btn:active { transform: scale(.96); }
.btn-green { background: #065f46; color: #6ee7b7; }
.btn-green:hover { background: #047857; }
.btn-red { background: #7f1d1d; color: #fca5a5; }
.btn-red:hover { background: #991b1b; }
.btn-outline { background: transparent; border: 1px solid var(--surface2); color: var(--text); }
.btn-outline:hover { background: var(--surface2); }
.btn-accent { background: var(--accent); color: #0f172a; }
.btn-accent:hover { opacity: .9; }
.progress-wrap { margin: 8px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width .3s; }
.stats { display: flex; gap: 10px; margin: 16px 0; }
.stat { flex: 1; background: var(--surface); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.yellow { color: var(--yellow); }
.spell-area { margin: 20px 0; }
.spell-prompt { text-align: center; margin-bottom: 16px; }
.spell-meaning { font-size: 28px; font-weight: 700; color: #c4b5fd; }
.spell-hint { font-size: 14px; color: var(--text2); margin-top: 6px; }
.spell-input {
  width: 100%; padding: 14px 18px; font-size: 20px; background: var(--surface);
  border: 2px solid var(--surface2); border-radius: var(--radius-sm); color: var(--text);
  text-align: center; letter-spacing: 1px; outline: none; transition: border-color .2s;
}
.spell-input:focus { border-color: var(--accent); }
.spell-input.correct { border-color: var(--green); background: rgba(52,211,153,.1); }
.spell-input.wrong { border-color: var(--red); background: rgba(248,113,113,.1); }
.spell-feedback { text-align: center; margin-top: 12px; font-size: 16px; min-height: 24px; }
.spell-feedback.correct { color: var(--green); }
.spell-feedback.wrong { color: var(--red); }

.sp-answer { display: none; margin-top: 14px; padding: 16px; background: rgba(129,140,248,.12); border-radius: var(--radius-sm); text-align: center; border: 1px solid rgba(129,140,248,.25); }
.sp-answer.show { display: block; animation: slideUp .3s ease-out; }
.sp-answer-word { font-size: 34px; font-weight: 700; color: #e2e8f0; letter-spacing: 2px; }
.sp-answer-meaning { font-size: 18px; color: #c4b5fd; margin-top: 4px; }
.category-bar { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; }
.cat-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid var(--surface2);
  background: transparent; color: var(--text2); cursor: pointer; transition: all .2s; white-space: nowrap;
}
.cat-chip.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }
.cat-chip:hover:not(.active) { border-color: var(--text2); }
.word-list { background: var(--surface); border-radius: var(--radius); overflow: hidden; margin-top: 12px; }
.word-item {
  display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--surface2);
  cursor: pointer; transition: background .15s; gap: 12px;
}
.word-item:last-child { border-bottom: none; }
.word-item:hover { background: rgba(255,255,255,.03); }
.word-item .eng { font-weight: 600; font-size: 15px; min-width: 120px; }
.word-item .chn { color: var(--text2); font-size: 14px; flex: 1; }
.word-item .pos { font-size: 11px; color: var(--accent); background: rgba(56,189,248,.15); padding: 2px 8px; border-radius: 10px; }
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn .2s;
}
.modal { background: var(--surface); border-radius: var(--radius); padding: 24px; max-width: 400px; width: 90%; box-shadow: var(--shadow); }
.modal h3 { margin-bottom: 12px; }
.modal p { color: var(--text2); font-size: 14px; margin-bottom: 16px; line-height: 1.6; }
.modal .btn { width: 100%; margin-top: 8px; }

/* Sidebar ring */
.side-col { text-align: center; }
.ring-wrap { display: flex; justify-content: center; margin: 0 0 12px; }
.ring-container { position: relative; width: 120px; height: 120px; }
.ring-container svg { transform: rotate(-90deg); width: 120px; height: 120px; }
.ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
.ring-fg { fill: none; stroke: var(--green); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
.ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: var(--text); }
.ring-label { font-size: 12px; color: var(--text2); margin-top: -8px; }
.side-stat { background: var(--surface); border-radius: var(--radius-sm); padding: 10px 8px; margin-bottom: 8px; }
.side-stat .val { font-size: 20px; font-weight: 700; }
.side-stat .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
.side-stat .val.g { color: var(--green); }
.side-stat .val.r { color: var(--red); }

/* Calendar */
.calendar { margin-top: 12px; background: var(--surface); border-radius: var(--radius-sm); padding: 10px 8px; }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cal-header button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; padding: 2px 6px; }
.cal-header button:hover { color: var(--text); }
.cal-month { font-size: 13px; font-weight: 600; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; }
.cal-day-label { font-size: 10px; color: var(--text2); padding: 2px 0; }
.cal-day { font-size: 12px; padding: 4px 0; border-radius: 50%; cursor: default; color: var(--text2); }
.cal-day.studied { background: #065f46; color: #6ee7b7; font-weight: 600; }
.cal-day.today { box-shadow: 0 0 0 1px var(--accent); }
.cal-day.empty { visibility: hidden; }

/* Chart */
.chart-wrap { margin-top: 10px; background: var(--surface); border-radius: var(--radius-sm); padding: 6px; }
.chart-wrap .chart-title { font-size: 10px; color: var(--text2); text-align: center; margin-bottom: 2px; }
.chart-wrap svg { display: block; margin: 0 auto; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.slide-up { animation: slideUp .3s ease-out; }
@media (max-width: 700px) {
  /* Stack layout vertically */
  .app { flex-direction: column; max-width: 100%; padding: 8px; gap: 0; }
  .main-col { width: 100%; }

  /* Sidebar becomes a collapsible top bar */
  .side-col {
    position: relative; width: 100%; flex-shrink: 0;
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    justify-content: center; padding: 8px; background: var(--surface);
    border-radius: var(--radius-sm); margin-bottom: 8px;
  }
  .side-col .ring-wrap { margin: 0 8px 0 0; }
  .side-col .ring-container { width: 56px; height: 56px; }
  .side-col .ring-container svg { width: 56px; height: 56px; }
  .side-col .ring-text { font-size: 15px; }
  .side-col .ring-label { display: none; }
  .side-col .side-stat { padding: 4px 8px; margin: 0; flex: 0 0 auto; text-align: center; }
  .side-col .side-stat .val { font-size: 14px; }
  .side-col .side-stat .lbl { font-size: 9px; }

  /* Hide calendar/chart/sync by default, toggle with a button */
  .side-col .calendar, .side-col .chart-wrap, .side-col #syncPanel,
  .side-col button, .side-col input[type=password] { display: none; }
  .side-col.expanded .calendar, .side-col.expanded .chart-wrap,
  .side-col.expanded #syncPanel, .side-col.expanded button,
  .side-col.expanded input[type=password] { display: block; }
  .side-col.expanded { flex-direction: column; align-items: stretch; max-height: 80vh; overflow-y: auto; }
  .side-col.expanded .side-stat { text-align: center; width: 100%; }
  .side-col.expanded .ring-container { width: 80px; height: 80px; margin: 0 auto; }
  .side-col.expanded .ring-container svg { width: 80px; height: 80px; }
  .side-col.expanded .ring-text { font-size: 20px; }
  .side-col.expanded .ring-label { display: block; }

  #sideToggle { display: inline-block !important; font-size: 11px; padding: 4px 10px; background: var(--surface2); border: none; color: var(--text2); border-radius: 12px; cursor: pointer; }

  /* Smaller stats row */
  .stats { gap: 4px; }
  .stat { padding: 8px 4px; }
  .stat-value { font-size: 16px; }
  .stat-label { font-size: 10px; }

  /* Tabs */
  .tab { font-size: 13px; padding: 8px 4px; }

  /* Category chips */
  .category-bar { gap: 4px; }
  .cat-chip { font-size: 11px; padding: 4px 10px; }

  /* Card */
  .fc-card { padding: 16px; }
  .card-word { font-size: 26px; }
  .card-phonetic { font-size: 14px; }
  .fc-input { font-size: 16px; padding: 12px; }
  .fc-answer .meaning { font-size: 18px; }
  .spell-meaning { font-size: 22px; }

  /* Actions */
  .actions { gap: 6px; }
  .btn { padding: 10px 14px; font-size: 13px; flex: 1; }

  /* Spelling */
  .spell-input { font-size: 18px; padding: 12px; }
  .sp-answer-word { font-size: 26px; }
  .sp-answer-meaning { font-size: 16px; }

  /* Word list */
  .word-item .eng { font-size: 13px; min-width: 90px; }
  .word-item .chn { font-size: 12px; }

  .header h1 { font-size: 22px; }
  .header { padding: 8px 0; }

  /* Sticky action buttons */
  #panelFlashcard .actions, #panelSpelling .actions {
    position: sticky; bottom: 8px; background: var(--bg);
    padding: 8px 0; margin: 8px 0 0; z-index: 10;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="main-col">
    <div class="header">
      <h1>📚 IELTS Vocabulary</h1>
      <div class="subtitle">雅思词汇 · 闪卡记忆 · 拼写练习</div>
    </div>
    <div class="stats" id="statsRow"></div>
    <div class="tabs">
    <button class="tab active" data-tab="flashcard">🃏 闪卡</button>
    <button class="tab" data-tab="spelling">✍️ 拼写</button>
    <button class="tab" data-tab="wrongbook">📝 错词本</button>
    <button class="tab" data-tab="browse">📖 浏览</button>
  </div>
  <div class="category-bar" id="categoryBar"></div>
  <div id="panelFlashcard">
    <div class="progress-wrap">
      <div class="progress-label"><span id="fcProgressLabel">0 / 0</span><span id="fcPercent">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="fcProgressFill" style="width:0%"></div></div>
    </div>
    <div class="fc-card">
      <div class="card-tag" id="fcTag"></div>
      <div class="card-word" id="fcWord">—</div>
      <div class="card-phonetic" id="fcPhonetic"></div>
      <input type="text" class="fc-input" id="fcInput" placeholder="输入中文释义…" autocomplete="off" autocorrect="off">
      <div class="fc-feedback" id="fcFeedback"></div>
      <div class="fc-answer" id="fcAnswer">
        <div class="meaning" id="fcMeaning">—</div>
        <div class="example" id="fcExample"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="fcSkip()">⏭ 跳过</button>
      <button class="btn btn-red" onclick="fcDontKnow()">🤷 不知道</button>
      <button class="btn btn-accent" onclick="fcSubmit()">✅ 提交</button>
    </div>
  </div>
  <div id="panelSpelling" style="display:none">
    <div class="progress-wrap">
      <div class="progress-label"><span id="spProgressLabel">0 / 0</span><span id="spScore">得分: 0</span></div>
      <div class="progress-bar"><div class="progress-fill" id="spProgressFill" style="width:0%"></div></div>
    </div>
    <div class="spell-area">
      <div class="spell-prompt">
        <div class="spell-meaning" id="spMeaning">—</div>
        <div class="spell-hint" id="spHint"></div>
      </div>
      <input type="text" class="spell-input" id="spellInput" placeholder="输入英文单词..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="spell-feedback" id="spFeedback"></div>
      <div class="sp-answer" id="spAnswer">
        <div class="sp-answer-word" id="spAnswerWord"></div>
        <div class="sp-answer-meaning" id="spAnswerMeaning"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="spellSkip()">⏭ 跳过</button>
      <button class="btn btn-red" onclick="spellDontKnow()">🤷 不知道</button>
      <button class="btn btn-accent" onclick="spellSubmit()">✅ 提交</button>
    </div>
  </div>
  <div id="panelWrongbook" style="display:none">
    <div style="text-align:center;padding:12px;color:var(--text2)" id="wrongEmpty">暂无错词 🎉</div>
    <div class="word-list" id="wrongList"></div>
    <div class="actions" style="margin-top:16px" id="wrongActions" hidden>
      <button class="btn btn-outline" onclick="clearWrongBook()">🗑 清空错词本</button>
      <button class="btn btn-accent" onclick="reviewWrongWords()">🔄 复习错词</button>
    </div>
  </div>
  <div id="panelBrowse" style="display:none">
    <div class="word-list" id="browseList"></div>
  </div>
  </div><!-- /main-col -->
  <div class="side-col" id="sideCol">
    <button id="sideToggle" style="display:none" onclick="toggleSidebar()">📊 学习数据</button>
    <div class="ring-wrap" id="ringWrap">
      <div class="ring-container">
        <svg viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="45"/>
          <circle class="ring-fg" id="ringFg" cx="50" cy="50" r="45" stroke-dasharray="282.7" stroke-dashoffset="282.7"/>
        </svg>
        <div class="ring-text" id="ringText">0%</div>
      </div>
      <div class="ring-label">今日正确率</div>
    </div>
    <div class="side-stat">
      <div class="val g" id="sideMastered">0</div>
      <div class="lbl">今日掌握</div>
    </div>
    <div class="side-stat">
      <div class="val r" id="sideWrong">0</div>
      <div class="lbl">待复习</div>
    </div>
    <div class="side-stat">
      <div class="val" id="sideLearned">0</div>
      <div class="lbl">累计已学</div>
    </div>
    <div class="calendar" id="calendar">
      <div class="cal-header">
        <button onclick="calPrevMonth()">◀</button>
        <span class="cal-month" id="calMonth">6月 2026</span>
        <button onclick="calNextMonth()">▶</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title" id="chartTitle">📈 每日首轮正确率</div>
      <svg viewBox="0 0 130 80" id="chartSvg"></svg>
    </div>
    <div class="side-stat" style="cursor:pointer" onclick="toggleSyncPanel()">
      <div class="val" id="syncStatus" style="font-size:14px">☁️ 未连接</div>
      <div class="lbl" id="syncStatusLabel">云同步 · 点击设置</div>
    </div>
    <div id="syncPanel" style="display:none;margin-bottom:6px">
      <div style="font-size:10px;color:var(--text2);margin-bottom:4px;line-height:1.4">使用码云 Gitee 同步（国内秒开）：<br>1. 打开 <a href="https://gitee.com/profile/personal_access_tokens" target="_blank" style="color:var(--accent)">gitee.com 创建令牌</a><br>2. 点「生成新令牌」→ 提交<br>3. 复制令牌粘贴到下面</div>
      <input type="password" id="githubToken" placeholder="粘贴 Gitee 令牌…" style="width:100%;padding:6px 8px;font-size:11px;background:var(--bg);border:1px solid var(--surface2);border-radius:4px;color:var(--text);margin-bottom:4px">
      <div style="display:flex;gap:4px">
        <button class="btn btn-accent" style="flex:1;font-size:10px;padding:6px" onclick="cloudConnect()">🔗 连接</button>
        <button class="btn btn-outline" style="flex:1;font-size:10px;padding:6px" onclick="cloudDisconnect()">断开</button>
      </div>
      <button class="btn btn-accent" style="margin-top:4px;width:100%;font-size:10px;padding:6px" onclick="cloudSyncNow()">☁️ 立即同步到云端</button>
      <div id="syncMsg" style="font-size:10px;color:var(--green);margin-top:3px;text-align:center"></div>
    </div>
    <button class="btn btn-outline" style="margin-top:4px;width:100%;font-size:10px;padding:6px" onclick="resetSpelling()">🔤 重置拼写</button>
    <button class="btn btn-outline" style="margin-top:4px;width:100%;font-size:11px;padding:8px" onclick="resetAll()">🔄 全部重置</button>
  </div>
</div><!-- /app -->
<script>
const VOCAB = [
    {w:"curriculum",p:"/kəˈrɪkjələm/",m:"课程",e:"The school offers a broad curriculum.",cat:"教育",pos:"n."},
    {w:"pedagogy",p:"/ˈpedəɡɒdʒi/",m:"教学法",e:"Modern pedagogy emphasizes critical thinking.",cat:"教育",pos:"n."},
    {w:"literacy",p:"/ˈlɪtərəsi/",m:"识字；读写能力",e:"Adult literacy programs are essential.",cat:"教育",pos:"n."},

// ========== APP STATE ==========
const STORAGE_KEY = 'ielts_vocab_state';
let state;
let currentTab = 'flashcard';
let filteredVocab = [];
let currentIndex = 0;
let spellWord = null;
let spellScore = 0;
let spellTotal = 0;
let activeCategory = '全部';
let dailyWords = null;    // today's word queue (initial 45, then grows with re-queues)
let dailyPos = 0;         // current position in queue
let dailyMastered = {};   // word indices answered correctly today
let dailyShown = {};      // word indices shown at least once
let dailyFirstDone = false; // whether all initial words have been shown
let dailyTarget = 0;      // number of unique words in today's set
let todayDone = false;    // all mastered
// Spelling daily state
let spDailyWords = null, spDailyPos = 0, spDailyMastered = {}, spDailyShown = {};
let spDailyFirstDone = false, spDailyTarget = 0, spTodayDone = false;

let calYear = 0;
let calMonth = 0;

function getToday() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function defaultState() {
  return {
    fcWrongWords: {},     // flashcard wrong words
    spWrongWords: {},     // spelling wrong words
    fcKnownWords: {},
    spKnownWords: {},
    fcIndex: 0,
    spIndex: 0,
    fcShuffled: null,
    spShuffled: null,
    score: 0,
    spTotal: 0,
    learnedHistory: {},   // flashcard {wordIndex: [date1, ...]}
    spLearnedHistory: {}, // spelling {wordIndex: [date1, ...]}
    lastDate: '',
    dailyWords: null, dailyPos: 0, dailyMastered: {},
    dailyStats: [],
    spDailyWords: null, spDailyPos: 0, spDailyMastered: {}, spDailyShown: {},
    spDailyFirstDone: false, spDailyTarget: 0,
    spDailyStats: [],
  };
}

function generateDailyWords() {
  var today = getToday();
  var history = state.learnedHistory || {};

  // Collect words seen before (any date) and never seen
  var allIndices = [];
  for (var i = 0; i < VOCAB.length; i++) allIndices.push(i);

  var seenIndices = Object.keys(history).map(Number);
  var unseenIndices = allIndices.filter(function(i) { return seenIndices.indexOf(i) === -1; });

  // Shuffle helper
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // Pick 30 new words (or fewer if not enough unseen)
  var newCount = Math.min(30, unseenIndices.length);
  var pickedNew = shuffle(unseenIndices).slice(0, newCount);

  // Pick 15 review words from seen words (or fewer)
  var reviewCount = Math.min(15, seenIndices.length);
  var pickedReview = shuffle(seenIndices).slice(0, reviewCount);

  // Combine and shuffle together
  var combined = pickedNew.concat(pickedReview);
  dailyWords = shuffle(combined);
  dailyPos = 0;
  dailyMastered = {};
  dailyShown = {};
  dailyFirstDone = false;
  dailyTarget = combined.length;
  todayDone = false;
  state.lastDate = today;
  // Persist daily session so refresh doesn't regenerate
  state.dailyWords = dailyWords.slice();
  state.dailyPos = 0;
  state.dailyMastered = {};
  saveState();

  return dailyWords.length;
}

// ===== Spelling daily words =====
function generateSpDailyWords() {
  var today = getToday();
  var history = state.spLearnedHistory || {};
  var allIndices = [];
  for (var i = 0; i < VOCAB.length; i++) allIndices.push(i);
  var seenIndices = Object.keys(history).map(Number);
  var unseenIndices = allIndices.filter(function(i) { return seenIndices.indexOf(i) === -1; });
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }
  var newCount = Math.min(30, unseenIndices.length);
  var reviewCount = Math.min(15, seenIndices.length);
  var combined = shuffle(unseenIndices).slice(0, newCount).concat(shuffle(seenIndices).slice(0, reviewCount));
  spDailyWords = shuffle(combined);
  spDailyPos = 0; spDailyMastered = {}; spDailyShown = {};
  spDailyFirstDone = false; spDailyTarget = combined.length; spTodayDone = false;
  state.lastDate = today;
  state.spDailyWords = spDailyWords.slice(); state.spDailyPos = 0;
  state.spDailyMastered = {}; state.spDailyShown = {};
  state.spDailyFirstDone = false; state.spDailyTarget = spDailyTarget;
  saveState();
  return spDailyWords.length;
}

function checkSpDailyReset() {
  var today = getToday();
  // Auto-fix: if no spelling history but daily target > 30, force regenerate
  var spHistoryEmpty = Object.keys(state.spLearnedHistory || {}).length === 0;
  if (state.lastDate !== today || !state.spDailyWords || state.spDailyWords.length === 0 || (spHistoryEmpty && (state.spDailyTarget || 0) > 30)) {
    generateSpDailyWords();
  } else {
    spDailyWords = (state.spDailyWords || []).slice();
    spDailyPos = state.spDailyPos || 0;
    spDailyMastered = state.spDailyMastered || {};
    spDailyShown = state.spDailyShown || {};
    spDailyFirstDone = state.spDailyFirstDone || false;
    spDailyTarget = state.spDailyTarget || spDailyWords.length || 45;
    spTodayDone = false;
  }
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var s = JSON.parse(raw);
      // Migrate old shared keys to module-specific
      if (s.knownWords && !s.fcKnownWords) {
        s.fcKnownWords = s.knownWords;
        delete s.knownWords;
      }
      if (s.wrongWords && !s.fcWrongWords) {
        s.fcWrongWords = s.wrongWords;
        delete s.wrongWords;
      }
      return { ...defaultState(), ...s };
    }
  } catch (e) {}
  return defaultState();
}

function saveState() {
  // Sync daily session data into state before saving
  state.dailyWords = dailyWords ? dailyWords.slice() : null;
  state.dailyPos = dailyPos;
  state.dailyMastered = dailyMastered ? Object.assign({}, dailyMastered) : {};
  state.dailyShown = dailyShown ? Object.assign({}, dailyShown) : {};
  state.dailyFirstDone = dailyFirstDone;
  state.dailyTarget = dailyTarget;
  // Spelling
  state.spDailyWords = spDailyWords ? spDailyWords.slice() : null;
  state.spDailyPos = spDailyPos;
  state.spDailyMastered = spDailyMastered ? Object.assign({}, spDailyMastered) : {};
  state.spDailyShown = spDailyShown ? Object.assign({}, spDailyShown) : {};
  state.spDailyFirstDone = spDailyFirstDone;
  state.spDailyTarget = spDailyTarget;

}

// ===== Daily word management =====
function checkDailyReset() {
  var today = getToday();
  if (state.lastDate !== today || !state.dailyWords || state.dailyWords.length === 0) {
    // New day: generate fresh daily words
    generateDailyWords();
  } else {
    // Same day: restore session from saved state
    dailyWords = (state.dailyWords || []).slice();
    dailyPos = state.dailyPos || 0;
    dailyMastered = state.dailyMastered || {};
    dailyShown = state.dailyShown || {};
    dailyFirstDone = state.dailyFirstDone || false;
    dailyTarget = state.dailyTarget || dailyWords.length || 45;
    todayDone = false;
  }
}

function filterVocab() {
  filteredVocab = activeCategory === '全部' ? VOCAB.slice() : VOCAB.filter(function(v) { return v.cat === activeCategory; });
  if (currentIndex >= filteredVocab.length) currentIndex = 0;
  updateFcProgress();
}

// ===== Chinese similarity check =====
function isMeaningSimilar(userInput, correctMeaning) {
  if (!userInput || !correctMeaning) return false;

  var normalize = function(s) {
    return s.replace(/[，。！？、；：""''（）\s,\.!\?;:'"\(\)\-]/g, '');
  };

  var u = normalize(userInput);
  var c = normalize(correctMeaning);

  if (u === c) return true;
  if (u.indexOf(c) !== -1) return true;

  var cChars = c.split('');
  var uChars = u.split('');
  var matchCount = 0;
  for (var i = 0; i < cChars.length; i++) {
    if (uChars.indexOf(cChars[i]) !== -1) matchCount++;
  }
  var ratio = matchCount / cChars.length;
  if (cChars.length <= 2) return ratio >= 0.8;
  return ratio >= 0.5;
}

// keeps getShuffled for spelling mode
function getShuffled(listKey) {
  if (!state[listKey]) {
    var indices = [];
    for (var i = 0; i < filteredVocab.length; i++) indices.push(i);
    for (var i = indices.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = indices[i];
      indices[i] = indices[j];
      indices[j] = tmp;
    }
    state[listKey] = indices;
  }
  return state[listKey];
}

// Get the original daily target (unique words assigned today)
function getDailyMasteredCount() {
  return Object.keys(dailyMastered).length;
}

function recordDailyStat(pct) {
  if (!state.dailyStats) state.dailyStats = [];
  var today = getToday();
  // Don't duplicate entries for the same day
  for (var i = 0; i < state.dailyStats.length; i++) {
    if (state.dailyStats[i].date === today) {
      state.dailyStats[i].pct = pct; // update with latest
      saveState();
      return;
    }
  }
  state.dailyStats.push({date: today, pct: pct});
  // Keep only last 60 days
  if (state.dailyStats.length > 60) state.dailyStats.shift();
  saveState();
}

// ===== Calendar =====
function getStudyDates() {
  // Collect dates from both flashcard and spelling histories
  var dates = {};
  function addHistory(h) {
    var keys = Object.keys(h || {});
    for (var i = 0; i < keys.length; i++) {
      var dateList = h[keys[i]];
      for (var j = 0; j < dateList.length; j++) {
        dates[dateList[j]] = true;
      }
    }
  }
  addHistory(state.learnedHistory);
  addHistory(state.spLearnedHistory);
  // Also mark today if user is actively studying
  if ((dailyWords && dailyPos > 0) || (spDailyWords && spDailyPos > 0)) {
    dates[getToday()] = true;
  }
  return dates;
}

function renderCalendar() {
  if (!calYear) {
    var now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth() + 1; // 1-12
  }

  var studyDates = getStudyDates();
  var today = getToday();

  document.getElementById('calMonth').textContent = calMonth + '月 ' + calYear;

  // Day labels
  var dayLabels = ['日', '一', '二', '三', '四', '五', '六'];
  var html = '';
  for (var d = 0; d < 7; d++) {
    html += '<div class="cal-day-label">' + dayLabels[d] + '</div>';
  }

  // First day of month
  var firstDay = new Date(calYear, calMonth - 1, 1).getDay();
  // Days in month
  var daysInMonth = new Date(calYear, calMonth, 0).getDate();

  // Empty cells before first day
  for (var e = 0; e < firstDay; e++) {
    html += '<div class="cal-day empty"></div>';
  }

  // Day cells
  for (var day = 1; day <= daysInMonth; day++) {
    var dateStr = calYear + '-' + String(calMonth).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    var classes = ['cal-day'];
    if (studyDates[dateStr]) classes.push('studied');
    if (dateStr === today) classes.push('today');
    html += '<div class="' + classes.join(' ') + '">' + day + '</div>';
  }

  document.getElementById('calGrid').innerHTML = html;
}

function calPrevMonth() {
  calMonth--;
  if (calMonth < 1) { calMonth = 12; calYear--; }
  renderCalendar();
}

function calNextMonth() {
  calMonth++;
  if (calMonth > 12) { calMonth = 1; calYear++; }
  renderCalendar();
}

// ===== Accuracy chart =====
function renderChart() {
  var isFC = (currentTab === 'flashcard');
  var stats = isFC ? (state.dailyStats || []) : (state.spDailyStats || []);
  var container = document.getElementById('chartSvg');
  if (!container) return;

  // Show last 10 days
  var data = stats.slice(-10);
  if (data.length < 1) {
    container.innerHTML = '<text x="65" y="45" text-anchor="middle" fill="#94a3b8" font-size="11">暂无数据</text>';
    return;
  }

  // Update chart title
  var titleEl = document.getElementById('chartTitle');
  if (titleEl) titleEl.textContent = isFC ? '📈 闪卡首轮正确率' : '📈 拼写首轮正确率';

  var W = 130, H = 80, padL = 28, padR = 8, padT = 8, padB = 16;
  var plotW = W - padL - padR;
  var plotH = H - padT - padB;

  var maxPct = 100, minPct = 0;
  // Find actual range
  for (var i = 0; i < data.length; i++) {
    if (data[i].pct > maxPct) maxPct = data[i].pct;
    if (data[i].pct < minPct) minPct = data[i].pct;
  }
  if (maxPct === minPct) { maxPct = minPct + 10; }

  // Build points
  var points = '';
  var divisor = data.length > 1 ? (data.length - 1) : 1;
  var range = maxPct > minPct ? (maxPct - minPct) : 10;
  for (var i = 0; i < data.length; i++) {
    var x = padL + (i / divisor) * plotW;
    var y = padT + plotH - ((data[i].pct - minPct) / range) * plotH;
    points += x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  }

  var html = '';
  // Grid lines
  for (var g = 0; g <= 4; g++) {
    var gy = padT + (g / 4) * plotH;
    var gv = Math.round(maxPct - (g / 4) * (maxPct - minPct));
    html += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (W - padR) + '" y2="' + gy + '" stroke="#334155" stroke-width="0.5"/>';
    html += '<text x="' + (padL - 3) + '" y="' + (gy + 3) + '" text-anchor="end" fill="#64748b" font-size="8">' + gv + '%</text>';
  }

  // Line (only if 2+ points)
  if (data.length >= 2) {
    html += '<polyline points="' + points + '" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  }

  // Dots + date labels
  for (var i = 0; i < data.length; i++) {
    var x = padL + (i / divisor) * plotW;
    var y = padT + plotH - ((data[i].pct - minPct) / range) * plotH;
    var isLast = (i === data.length - 1);
    html += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="' + (isLast ? 3 : 2) + '" fill="' + (isLast ? '#34d399' : '#38bdf8') + '"/>';
    // Date label every other or last
    if (i % 3 === 0 || isLast) {
      var d = data[i].date.slice(5); // MM-DD
      html += '<text x="' + x.toFixed(1) + '" y="' + (H - 2) + '" text-anchor="middle" fill="#64748b" font-size="7">' + d + '</text>';
    }
  }

  container.innerHTML = html;
}

function showCard() {
  if (!dailyWords || dailyWords.length === 0 || dailyTarget === 0) {
    document.getElementById('fcWord').textContent = '暂无单词';
    document.getElementById('fcPhonetic').textContent = '';
    document.getElementById('fcTag').textContent = '';
    document.getElementById('fcMeaning').textContent = '';
    document.getElementById('fcExample').textContent = '';
    return;
  }

  var mastered = getDailyMasteredCount();

  // All target words mastered → done!
  if (mastered >= dailyTarget) {
    todayDone = true;
    // All mastered → clear today's wrong words for this module
    state.fcWrongWords = {};
    saveState();
    document.getElementById('fcWord').textContent = '🎉';
    document.getElementById('fcPhonetic').textContent = '';
    document.getElementById('fcTag').textContent = '今日学习完成 · 正确率100%';
    document.getElementById('fcMeaning').textContent = '熟练掌握 ' + dailyTarget + ' 个单词';
    document.getElementById('fcExample').textContent = '明天继续加油！';
    var inputEl = document.getElementById('fcInput');
    inputEl.style.display = 'none';
    document.getElementById('fcFeedback').textContent = '';
    document.getElementById('fcFeedback').className = 'fc-feedback';
    document.getElementById('fcAnswer').classList.remove('show');
    updateFcProgress();
    updateSidebar();
    return;
  }

  // End of queue reached
  if (dailyPos >= dailyWords.length) {
    if (dailyFirstDone) {
      // Review phase: refill queue with remaining unmastered words
      var remaining = [];
      for (var i = 0; i < dailyWords.length; i++) {
        var wi = dailyWords[i];
        if (!dailyMastered[wi] && remaining.indexOf(wi) === -1) {
          remaining.push(wi);
        }
      }
      if (remaining.length > 0) {
        // Shuffle and append
        for (var r = remaining.length - 1; r > 0; r--) {
          var j = Math.floor(Math.random() * (r + 1));
          var t = remaining[r]; remaining[r] = remaining[j]; remaining[j] = t;
        }
        dailyWords = dailyWords.concat(remaining);
        // continue to show next word
      } else {
        // All mastered
        todayDone = true;
        showCard();
        return;
      }
    } else {
      // First pass just finished: record accuracy & collect unmastered
      dailyFirstDone = true;
      var firstPct = dailyTarget > 0 ? Math.round((getDailyMasteredCount() / dailyTarget) * 100) : 0;
      recordDailyStat(firstPct);
      var unmastered = [];
      for (var k = 0; k < dailyWords.length; k++) {
        var w = dailyWords[k];
        if (!dailyMastered[w] && unmastered.indexOf(w) === -1) {
          unmastered.push(w);
        }
      }
      if (unmastered.length > 0) {
        for (var u = unmastered.length - 1; u > 0; u--) {
          var ju = Math.floor(Math.random() * (u + 1));
          var tu = unmastered[u]; unmastered[u] = unmastered[ju]; unmastered[ju] = tu;
        }
        dailyWords = dailyWords.concat(unmastered);
      }
    }
  }

  todayDone = false;
  var wordIdx = dailyWords[dailyPos];
  // Mark as shown
  dailyShown[wordIdx] = true;
  // Check if first pass is done
  if (!dailyFirstDone && Object.keys(dailyShown).length >= dailyTarget) {
    dailyFirstDone = true;
  }

  currentIndex = wordIdx;
  var word = VOCAB[wordIdx];
  if (!word) {
    dailyPos++;
    showCard();
    return;
  }

  document.getElementById('fcWord').textContent = word.w;
  document.getElementById('fcPhonetic').textContent = word.p || '';
  document.getElementById('fcTag').textContent = word.cat + ' · ' + (word.pos || '') + ' | 📅 ' + getToday();
  document.getElementById('fcMeaning').textContent = word.m;
  document.getElementById('fcExample').textContent = word.e ? '"' + word.e + '"' : '';

  var input = document.getElementById('fcInput');
  input.style.display = '';
  input.value = '';
  input.className = 'fc-input';
  input.disabled = false;
  input.focus();
  document.getElementById('fcFeedback').textContent = '';
  document.getElementById('fcFeedback').className = 'fc-feedback';
  document.getElementById('fcAnswer').classList.remove('show');

  updateFcProgress();
  updateSidebar();
}

function fcSubmit() {
  if (!dailyWords || dailyWords.length === 0 || todayDone) return;
  var input = document.getElementById('fcInput');
  var answer = input.value.trim();
  if (!answer) return;

  var wordIdx = dailyWords[dailyPos];
  var word = VOCAB[wordIdx];
  var similar = isMeaningSimilar(answer, word.m);

  var feedback = document.getElementById('fcFeedback');
  var answerDiv = document.getElementById('fcAnswer');
  answerDiv.classList.add('show');
  input.disabled = true;

  if (similar) {
    input.className = 'fc-input correct';
    feedback.textContent = '✅ 意思对了！';
    feedback.className = 'fc-feedback ok';
    dailyMastered[wordIdx] = true;
    state.fcKnownWords[wordIdx] = (state.fcKnownWords[wordIdx] || 0) + 1;
    delete state.fcWrongWords[wordIdx];
    if (!state.learnedHistory[wordIdx]) state.learnedHistory[wordIdx] = [];
    var today = getToday();
    if (state.learnedHistory[wordIdx].indexOf(today) === -1) {
      state.learnedHistory[wordIdx].push(today);
    }
    saveState();
    renderStats();
    updateSidebar();
    advanceDaily(1000);
  } else {
    input.className = 'fc-input wrong';
    feedback.textContent = '❌ 不完全正确' + (dailyFirstDone ? '，稍后再练' : '，首轮结束后复习');
    feedback.className = 'fc-feedback no';
    state.fcWrongWords[wordIdx] = Date.now();
    saveState();
    renderStats();
    updateSidebar();
    advanceDaily(2200);
  }
}

function nextSpellWord() {
  if (!spDailyWords || spDailyWords.length === 0 || spDailyTarget === 0) {
    document.getElementById('spMeaning').textContent = '暂无单词';
    document.getElementById('spHint').textContent = '';
    return;
  }

  var mastered = spGetMasteredCount();
  if (mastered >= spDailyTarget) {
    spTodayDone = true;
    state.spWrongWords = {};
    saveState();
    document.getElementById('spMeaning').textContent = '🎉 拼写全部掌握';
    document.getElementById('spHint').textContent = '正确率100%，' + spDailyTarget + '个单词';
    document.getElementById('spellInput').style.display = 'none';
    document.getElementById('spFeedback').textContent = '';
    document.getElementById('spFeedback').className = 'spell-feedback';
    document.getElementById('spAnswer').classList.remove('show');
    updateSpProgress();
    updateSidebar();
    return;
  }

  if (spDailyPos >= spDailyWords.length) {
    if (spDailyFirstDone) {
      var remaining = [];
      for (var i = 0; i < spDailyWords.length; i++) {
        var wi = spDailyWords[i];
        if (!spDailyMastered[wi] && remaining.indexOf(wi) === -1) remaining.push(wi);
      }
      if (remaining.length > 0) {
        for (var r = remaining.length - 1; r > 0; r--) {
          var j = Math.floor(Math.random() * (r + 1));
          var t = remaining[r]; remaining[r] = remaining[j]; remaining[j] = t;
        }
        spDailyWords = spDailyWords.concat(remaining);
      } else { spTodayDone = true; state.spWrongWords = {}; saveState(); nextSpellWord(); return; }
    } else {
      spDailyFirstDone = true;
      var pct = spDailyTarget > 0 ? Math.round((spGetMasteredCount() / spDailyTarget) * 100) : 0;
      recordSpDailyStat(pct);
      var unmastered = [];
      for (var k = 0; k < spDailyWords.length; k++) {
        var w = spDailyWords[k];
        if (!spDailyMastered[w] && unmastered.indexOf(w) === -1) unmastered.push(w);
      }
      if (unmastered.length > 0) {
        for (var u = unmastered.length - 1; u > 0; u--) {
          var ju = Math.floor(Math.random() * (u + 1));
          var tu = unmastered[u]; unmastered[u] = unmastered[ju]; unmastered[ju] = tu;
        }
        spDailyWords = spDailyWords.concat(unmastered);
      }
    }
  }

  var wordIdx = spDailyWords[spDailyPos];
  spDailyShown[wordIdx] = true;
  if (!spDailyFirstDone && Object.keys(spDailyShown).length >= spDailyTarget) {
    spDailyFirstDone = true;
  }

  var word = VOCAB[wordIdx];
  if (!word) { spDailyPos++; nextSpellWord(); return; }

  spellWord = word;
  spellWord._idx = wordIdx;
  document.getElementById('spMeaning').textContent = word.m;
  document.getElementById('spHint').textContent = word.cat + (word.pos ? ' · ' + word.pos : '') + ' · ' + word.w.length + ' letters';
  var input = document.getElementById('spellInput');
  input.style.display = '';
  input.value = '';
  input.className = 'spell-input';
  input.disabled = false;
  input.focus();
  document.getElementById('spFeedback').textContent = '';
  document.getElementById('spFeedback').className = 'spell-feedback';
  document.getElementById('spAnswer').classList.remove('show');
  updateSpProgress();
}

function spellSubmit() {
  if (!spellWord || spTodayDone) return;
  var input = document.getElementById('spellInput');
  var answer = input.value.trim().toLowerCase();
  var correct = spellWord.w.toLowerCase();
  var fb = document.getElementById('spFeedback');
  input.disabled = true;
  spellTotal++;
  var wordIdx = spellWord._idx;

  if (answer === correct) {
    spellScore++;
    input.className = 'spell-input correct';
    fb.textContent = '✅ 正确！';
    fb.className = 'spell-feedback correct';
    spDailyMastered[wordIdx] = true;
    state.spKnownWords[wordIdx] = (state.spKnownWords[wordIdx] || 0) + 1;
    delete state.spWrongWords[wordIdx];
    if (!state.spLearnedHistory[wordIdx]) state.spLearnedHistory[wordIdx] = [];
    var today = getToday();
    if (state.spLearnedHistory[wordIdx].indexOf(today) === -1) state.spLearnedHistory[wordIdx].push(today);
  } else {
    input.className = 'spell-input wrong';
    fb.textContent = '❌ 拼写错误' + (spDailyFirstDone ? '，稍后再练' : '，首轮结束后复习');
    fb.className = 'spell-feedback wrong';
    showSpAnswer(spellWord);
    state.spWrongWords[wordIdx] = Date.now();
  }
  state.score = spellScore; state.spTotal = spellTotal;
  saveState();
  updateSpProgress();
  renderStats();
  updateSidebar();
  spAdvance(answer === correct ? 1000 : 2500);
}

function showSpAnswer(word) {
  var div = document.getElementById('spAnswer');
  document.getElementById('spAnswerWord').textContent = word.w;
  document.getElementById('spAnswerMeaning').textContent = word.m;
  div.classList.add('show');
}

function spellDontKnow() {
  if (!spellWord || spTodayDone) return;
  var fb = document.getElementById('spFeedback');
  fb.textContent = '🤷 已加入错词本' + (spDailyFirstDone ? '，稍后再练' : '，首轮结束后复习');
  fb.className = 'spell-feedback wrong';
  showSpAnswer(spellWord);
  spellTotal++;
  state.spWrongWords[spellWord._idx] = Date.now();
  state.spTotal = spellTotal;
  saveState();
  updateSpProgress();
  renderStats();
  updateSidebar();
  spAdvance(2500);
}

function spellSkip() {
  if (!spellWord || spTodayDone) return;
  var fb = document.getElementById('spFeedback');
  fb.textContent = '⏭ 已跳过' + (spDailyFirstDone ? '，稍后再练' : '，首轮结束后复习');
  fb.className = 'spell-feedback wrong';
  showSpAnswer(spellWord);
  spellTotal++;
  state.spWrongWords[spellWord._idx] = Date.now();
  state.spTotal = spellTotal;
  saveState();
  updateSpProgress();
  renderStats();
  updateSidebar();
  spAdvance(1500);
}

function recordSpDailyStat(pct) {
  if (!state.spDailyStats) state.spDailyStats = [];
  var today = getToday();
  for (var i = 0; i < state.spDailyStats.length; i++) {
    if (state.spDailyStats[i].date === today) { state.spDailyStats[i].pct = pct; saveState(); return; }
  }
  state.spDailyStats.push({date: today, pct: pct});
  if (state.spDailyStats.length > 60) state.spDailyStats.shift();
  saveState();
}

function updateSpProgress() {
  var target = spDailyTarget || 45;
  var mastered = spGetMasteredCount();
  var shown = Object.keys(spDailyShown).length;
  var label, pct;
  if (spTodayDone) {
    label = '🎉 全部掌握 ' + target + ' / ' + target;
    pct = 100;
  } else if (!spDailyFirstDone) {
    label = '首次学习 ' + Math.min(shown, target) + ' / ' + target;
    pct = target > 0 ? Math.round((shown / target) * 100) : 0;
  } else {
    label = '巩固复习 已掌握 ' + mastered + ' / ' + target;
    pct = target > 0 ? Math.round((mastered / target) * 100) : 0;
  }
  document.getElementById('spProgressLabel').textContent = label;
  document.getElementById('spScore').textContent = '得分: ' + spellScore + '/' + spellTotal;
  document.getElementById('spProgressFill').style.width = pct + '%';
}

document.addEventListener('keydown', function(e) {
  if (currentTab === 'spelling') {
    if (e.key === 'Enter') {
      e.preventDefault();
      spellSubmit();
      return;
    }
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      e.stopPropagation();
      if (!spTodayDone) spellDontKnow();
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      if (!spTodayDone) spellSkip();
      return;
    }
  }
  if (currentTab === 'flashcard') {
    // Right arrow = Don't Know (works even when input is focused)
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      e.stopPropagation();
      if (!todayDone) fcDontKnow();
      return;
    }
    // Escape = Skip
    if (e.key === 'Escape') {
      e.preventDefault();
      if (!todayDone) fcSkip();
      return;
    }
    // Enter = Submit
    if (e.key === 'Enter') {
      e.preventDefault();
      var input = document.getElementById('fcInput');
      if (!input.disabled && input.value.trim()) {
        fcSubmit();
      }
      return;
    }
  }
}, true); // capture phase to intercept before input gets it

function getAllWrongWords() {
  // Merge fcWrongWords and spWrongWords, keep latest timestamp
  var merged = {};
  var fc = state.fcWrongWords || {};
  var sp = state.spWrongWords || {};
  var keys = Object.keys(fc).concat(Object.keys(sp));
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var fcTs = fc[k] || 0;
    var spTs = sp[k] || 0;
    merged[k] = Math.max(fcTs, spTs);
  }
  return merged;
}

function renderWrongBook() {
  const list = document.getElementById('wrongList');
  const empty = document.getElementById('wrongEmpty');
  const actions = document.getElementById('wrongActions');
  const allWrong = getAllWrongWords();
  const entries = Object.entries(allWrong).sort(function(a, b) { return b[1] - a[1]; });
  if (entries.length === 0) {
    empty.hidden = false;
    list.innerHTML = '';
    actions.hidden = true;
    return;
  }
  empty.hidden = true;
  actions.hidden = false;
  list.innerHTML = entries.map(function(entry) {
    const idx = parseInt(entry[0]);
    const ts = entry[1];
    const word = VOCAB[idx];
    if (!word) return '';
    const date = new Date(ts).toLocaleDateString('zh-CN');
    return '<div class="word-item" onclick="jumpToWord(' + idx + ')"><span class="eng">' + word.w + '</span><span class="chn">' + word.m + '</span><span class="pos">' + word.cat + '</span><span style="font-size:11px;color:var(--text2);margin-left:auto">' + date + '</span></div>';
  }).join('');
}

function clearWrongBook() {
  if (confirm('确定清空所有错词记录（闪卡+拼写）？')) {
    state.fcWrongWords = {};
    state.spWrongWords = {};
    saveState();
    renderWrongBook();
    renderStats();
    updateSidebar();
  }
}

// ===== Cloud Sync via GitHub Gist =====
var CLOUD_KEY = 'ielts_cloud_cfg';
var cloudCfg = {};
try { cloudCfg = JSON.parse(localStorage.getItem(CLOUD_KEY)) || {}; } catch(e) {}

function cloudSaveCfg() {
  localStorage.setItem(CLOUD_KEY, JSON.stringify(cloudCfg));
}

function toggleSidebar() {
  var side = document.getElementById('sideCol');
  var btn = document.getElementById('sideToggle');
  if (side.classList.contains('expanded')) {
    side.classList.remove('expanded');
    btn.textContent = '📊 学习数据';
  } else {
    side.classList.add('expanded');
    btn.textContent = '✕ 收起';
  }
}

function toggleSyncPanel() {
  // If token exists but not connected, connect directly instead of showing panel
  if (cloudCfg.token && !cloudCfg.snippetId) {
    document.getElementById('githubToken').value = cloudCfg.token || '';
    cloudConnect();
    return;
  }
  var p = document.getElementById('syncPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (p.style.display === 'block') {
    document.getElementById('githubToken').value = cloudCfg.token || '';
  }
  updateSyncStatus();
}

function updateSyncStatus() {
  var el = document.getElementById('syncStatus');
  var lbl = document.getElementById('syncStatusLabel');
  if (cloudCfg.token && cloudCfg.snippetId) {
    el.textContent = '☁️ 已连接';
    el.style.color = '#34d399';
    if (lbl) lbl.textContent = '云同步 · 点击设置';
  } else if (cloudCfg.token) {
    el.textContent = '☁️ 连接中…';
    el.style.color = '#fbbf24';
    if (lbl) lbl.textContent = '正在连接Gitee…';
  } else {
    el.textContent = '☁️ 未连接';
    el.style.color = '';
    if (lbl) lbl.textContent = '云同步 · 点击设置';
  }
}

function cloudConnect() {
  var token = document.getElementById('githubToken').value.trim();
  if (!token) { cloudMsg('请输入 token', 'red'); return; }
  cloudCfg.token = token;
  cloudCfg._checked = false; // reset check flag on new connection
  cloudSaveCfg();
  cloudMsg('正在连接…', '');
  // Test token and find or create gist
  cloudApi('GET', 'https://gitee.com/api/v5/gists?per_page=100', null, function(gists) {
    var found = null;
    for (var i = 0; i < gists.length; i++) {
      if (gists[i].description === 'ielts-vocab-cloud') {
        found = gists[i]; break;
      }
    }
    if (found) {
      cloudCfg.snippetId = found.id;
      cloudSaveCfg();
      cloudMsg('✅ 已连接！云端数据已找到', 'green');
      updateSyncStatus();
      cloudPull();
    } else {
      // Create new gist
      saveState();
      var payload = {
        description: 'ielts-vocab-cloud',
        public: false,
        files: { 'ielts-state.json': { content: JSON.stringify({v:1, t: new Date().toISOString(), s: state}) } }
      };
      cloudApi('POST', 'https://gitee.com/api/v5/gists', payload, function(newGist) {
        cloudCfg.snippetId = newGist.id;
        cloudSaveCfg();
        cloudMsg('✅ 已连接！云端已初始化', 'green');
        updateSyncStatus();
      });
    }
  });
}

function cloudSyncNow() {
  if (!cloudCfg.token || !cloudCfg.snippetId) {
    cloudMsg('请先连接云同步', 'red');
    return;
  }
  cloudMsg('⏳ 同步中…', '');
  saveState();
  var payload = {
    description: 'ielts-vocab-cloud',
    files: { 'ielts-state.json': { content: JSON.stringify({v:1, t: new Date().toISOString(), s: state}) } }
  };
  cloudApi('PATCH', 'https://gitee.com/api/v5/gists/' + cloudCfg.snippetId, payload, function() {
    cloudMsg('✅ 同步成功 ' + new Date().toLocaleTimeString('zh-CN'), 'green');
    setTimeout(function() { cloudMsg('', ''); }, 3000);
  });
}

function cloudDisconnect() {
  if (confirm('确定断开云同步？\n\n本地数据不会被删除。')) {
    cloudCfg.token = '';
    cloudCfg.snippetId = '';
    cloudSaveCfg();
    document.getElementById('githubToken').value = '';
    document.getElementById('syncPanel').style.display = 'none';
    updateSyncStatus();
    cloudMsg('', '');
  }
}

function cloudPush() {
  if (!cloudCfg.token || !cloudCfg.snippetId) return;
  saveState();
  var payload = {
    description: 'ielts-vocab-cloud',
    files: { 'ielts-state.json': { content: JSON.stringify({v:1, t: new Date().toISOString(), s: state}) } }
  };
  cloudApi('PATCH', 'https://gitee.com/api/v5/gists/' + cloudCfg.snippetId, payload, function() {
    // silent success
  });
}

function cloudPull() {
  if (!cloudCfg.token || !cloudCfg.snippetId) return;
  // Skip if already checked this session
  if (cloudCfg._checked) return;
  cloudCfg._checked = true;
  cloudApi('GET', 'https://gitee.com/api/v5/gists/' + cloudCfg.snippetId, null, function(gist) {
    try {
      var file = gist.files && gist.files['ielts-state.json'];
      if (file && file.content) {
        var data = JSON.parse(file.content);
        if (data.s) {
          // Compare dates (day-level): only prompt if cloud is from a different day
          var cloudDate = (data.t || '').slice(0, 10); // YYYY-MM-DD
          var localDate = state.lastDate || '';
          var localKnownCount = Object.keys(state.fcKnownWords || {}).length + Object.keys(state.spKnownWords || {}).length;
          var cloudKnownCount = Object.keys(data.s.fcKnownWords || {}).length + Object.keys(data.s.spKnownWords || {}).length;

          // First time on this device (no local progress)
          if (localKnownCount === 0 && cloudKnownCount > 0) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data.s));
            location.reload();
            return;
          }
          // Cloud is from a newer day AND has more progress
          if (cloudDate > localDate && cloudKnownCount > localKnownCount) {
            if (confirm('云端有 ' + cloudDate + ' 的学习进度\n\n云端已学: ' + cloudKnownCount + ' 词\n本机已学: ' + localKnownCount + ' 词\n\n是否从云端恢复？')) {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(data.s));
              location.reload();
            }
          }
        }
      }
    } catch(e) { cloudMsg('云端数据解析失败', 'red'); }
  });
}

function cloudApi(method, url, body, callback) {
  var xhr = new XMLHttpRequest();
  // Gitee uses access_token as query parameter
  var sep = url.indexOf('?') === -1 ? '?' : '&';
  var fullUrl = url + sep + 'access_token=' + encodeURIComponent(cloudCfg.token);
  xhr.open(method, fullUrl, true);
  if (body) {
    xhr.setRequestHeader('Content-Type', 'application/json');
  }
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      var resp = JSON.parse(xhr.responseText || '{}');
      if (callback) callback(resp);
    } else {
      if (xhr.status === 401 || xhr.status === 403) {
        cloudMsg('令牌无效，请重新生成', 'red');
        cloudCfg.token = ''; cloudCfg.snippetId = '';
        cloudSaveCfg(); updateSyncStatus();
      } else {
        cloudMsg('请求失败 ' + xhr.status, 'red');
      }
    }
  };
  xhr.onerror = function() { cloudMsg('网络失败，稍后重试', 'red'); };
  xhr.send(body ? JSON.stringify(body) : null);
}

function cloudMsg(msg, color) {
  var el = document.getElementById('syncMsg');
  if (el) { el.textContent = msg; el.style.color = color || '#94a3b8'; }
}

// Modify saveState to auto-push to cloud
var _origSaveState = saveState;
saveState = function() {
  _origSaveState();
  // Debounced cloud push (every 5 seconds max)
  if (cloudCfg.token && cloudCfg.snippetId) {
    if (!saveState._timer) {
      saveState._timer = setTimeout(function() {
        saveState._timer = null;
        cloudPush();
      }, 5000);
    }
  }
};

// On init, try auto-pull
var _origInit = init;
init = function() {
  _origInit();
  updateSyncStatus();
  // Auto-pull if connected
  if (cloudCfg.token && cloudCfg.snippetId) {
    setTimeout(function() { cloudPull(); }, 2000);
  }
};

function resetSpelling() {
  if (confirm('确定只重置拼写模块吗？\n\n闪卡进度不受影响。\n\n拼写的已答对、错词、每日进度将被清空。')) {
    state.spKnownWords = {};
    state.spWrongWords = {};
    state.spLearnedHistory = {};
    state.spDailyWords = null;
    state.spDailyPos = 0;
    state.spDailyMastered = {};
    state.spDailyShown = {};
    state.spDailyFirstDone = false;
    state.spDailyTarget = 0;
    state.spDailyStats = [];
    spDailyWords = null;
    spDailyPos = 0;
    spDailyMastered = {};
    spDailyShown = {};
    spDailyFirstDone = false;
    spDailyTarget = 0;
    spTodayDone = false;
    spellScore = 0;
    spellTotal = 0;
    state.score = 0;
    state.spTotal = 0;
    saveState();
    location.reload();
  }
}

function resetAll() {
  if (confirm('⚠️ 确定要清除所有学习进度并重新开始吗？\n\n这将清空：\n· 已学单词记录\n· 错词本\n· 每日学习进度\n· 日历打卡记录\n\n此操作不可恢复！')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

function reviewWrongWords() {
  var allWrong = getAllWrongWords();
  var entries = Object.keys(allWrong);
  if (entries.length === 0) return;
  var wrongIndices = entries.map(Number);
  // Shuffle wrong words into today's session
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }
  dailyWords = shuffle(wrongIndices);
  dailyPos = 0;
  dailyMastered = {};
  dailyShown = {};
  dailyFirstDone = false;
  dailyTarget = wrongIndices.length;
  todayDone = false;
  activeCategory = '错词复习';
  renderCategories();
  switchTab('flashcard');
}

function jumpToWord(idx) {
  dailyWords = [idx];
  dailyPos = 0;
  dailyMastered = {};
  dailyShown = {};
  dailyFirstDone = false;
  dailyTarget = 1;
  todayDone = false;
  activeCategory = '全部';
  renderCategories();
  switchTab('flashcard');
  showCard();
}

function renderBrowse() {
  const list = document.getElementById('browseList');
  const words = activeCategory === '全部' ? VOCAB : VOCAB.filter(function(v) { return v.cat === activeCategory; });
  list.innerHTML = words.map(function(word, i) {
    const isWrong = (state.fcWrongWords[i] || state.spWrongWords[i]) ? ' ⚠️' : '';
    const isKnown = (state.fcKnownWords[i] || state.spKnownWords[i]) ? ' ✅' : '';
    return '<div class="word-item" onclick="browseToFlashcard(' + i + ')"><span class="eng">' + word.w + isWrong + isKnown + '</span><span class="chn">' + word.m + '</span><span class="pos">' + (word.pos || '') + '</span><span style="font-size:11px;color:var(--text2);margin-left:auto">' + word.cat + '</span></div>';
  }).join('');
}

function browseToFlashcard(idx) {
  dailyWords = [idx];
  dailyPos = 0;
  dailyMastered = {};
  dailyShown = {};
  dailyFirstDone = false;
  dailyTarget = 1;
  todayDone = false;
  activeCategory = '全部';
  renderCategories();
  switchTab('flashcard');
  showCard();
}

function renderStats() {
  var total = VOCAB.length;
  var isFC = (currentTab === 'flashcard');
  var known = Object.keys(isFC ? (state.fcKnownWords || {}) : (state.spKnownWords || {})).length;
  var wrong = Object.keys(isFC ? (state.fcWrongWords || {}) : (state.spWrongWords || {})).length;
  // Use active module's data for today's progress
  var activeTodayDone = isFC ? todayDone : spTodayDone;
  var activeTarget = isFC ? (dailyTarget || 45) : (spDailyTarget || 45);
  var activeMastered = isFC ? getDailyMasteredCount() : spGetMasteredCount();
  var activeLabel = isFC ? '闪卡' : '拼写';
  var remainText;
  if (activeTodayDone) {
    remainText = '✅';
  } else {
    remainText = activeMastered + '/' + activeTarget;
  }
  document.getElementById('statsRow').innerHTML =
    '<div class="stat"><div class="stat-value">' + total + '</div><div class="stat-label">总词汇</div></div>' +
    '<div class="stat"><div class="stat-value green">' + known + '</div><div class="stat-label">已答对</div></div>' +
    '<div class="stat"><div class="stat-value red">' + wrong + '</div><div class="stat-label">待复习</div></div>' +
    '<div class="stat"><div class="stat-value yellow">' + remainText + '</div><div class="stat-label">' + activeLabel + '进度</div></div>';
}

function init() {
  // Auto-configure cloud token from URL (for easy mobile setup)
  var params = new URLSearchParams(window.location.search);
  var urlToken = params.get('token');
  if (urlToken && !cloudCfg.token) {
    cloudCfg.token = urlToken;
    cloudCfg._checked = false;
    cloudSaveCfg();
    // Auto-connect after page loads
    setTimeout(function() {
      document.getElementById('githubToken').value = urlToken;
      cloudConnect();
    }, 2000);
  }

  state = loadState();
  spellScore = state.score || 0;
  spellTotal = state.spTotal || 0;
  filteredVocab = VOCAB.slice();
  checkDailyReset();
  checkSpDailyReset();
  renderStats();
  renderCategories();
  filterVocab();
  showCard();
  switchTab('flashcard');
  updateSidebar();
}

init();
</script>
